<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lookup Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --ink: #1a1410;
      --accent: #c84b2f;
      --muted: #8a7f72;
      --card: #fffdf8;
      --border: #d6cfc3;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
    }

    .label {
      font-family: 'Fraunces', serif;
      font-size: 0.75rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 0.25rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      box-shadow: 4px 4px 0px var(--border);
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    input[type="number"] {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 1.4rem;
      padding: 0.6rem 0.8rem;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: var(--accent); }

    button {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      min-height: 3.5rem;
      display: flex;
      align-items: center;
      border-top: 1px dashed var(--border);
      padding-top: 1.25rem;
    }

    .result-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 1rem;
      white-space: nowrap;
    }

    .result-value {
      font-family: 'Fraunces', serif;
      font-size: 1.9rem;
      font-weight: 300;
      font-style: italic;
      color: var(--ink);
      transition: opacity 0.2s;
    }

    .result-value.error {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-style: normal;
      color: var(--muted);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 1.5rem;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #4caf72;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="label">Live Sheet</div>
  <h1>Look<em>up</em></h1>
  <p class="subtitle">Enter a number — fetch the value from Google Sheets</p>

  <div class="card">
    <div class="input-row">
      <input type="number" id="numInput" placeholder="1" min="1" />
      <button id="lookupBtn" onclick="doLookup()">Go</button>
    </div>

    <div class="result-box" id="resultBox">
      <span class="result-label">Result</span>
      <span class="result-value error" id="resultVal">—</span>
    </div>
  </div>

  <div class="live-badge">
    <span class="live-dot"></span>
    Live from Google Sheets
  </div>
</div>

<script>
  const SHEET_ID = '1GRaECPcnF1aqRV84aSHhSphdUzgfiT--puQfyfEC3KA';
  const INPUT_COL  = 0; // Column A (Input numbers)
  const OUTPUT_COL = 1; // Column B (Output words)

  const btn = document.getElementById('lookupBtn');
  const resultVal = document.getElementById('resultVal');
  const resultBox = document.getElementById('resultBox');
  const numInput = document.getElementById('numInput');

  numInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLookup(); });

  function setResult(text, isError = false) {
    resultVal.className = 'result-value' + (isError ? ' error' : '');
    resultVal.textContent = text;
  }

  function setLoading(on) {
    btn.disabled = on;
    if (on) {
      resultBox.innerHTML = '<span class="result-label">Result</span><div class="spinner"></div>';
    } else {
      resultBox.innerHTML = '<span class="result-label">Result</span><span class="result-value error" id="resultVal">—</span>';
    }
  }

  async function doLookup() {
    const num = numInput.value.trim();
    if (!num) {
      setLoading(false);
      document.getElementById('resultVal').className = 'result-value error';
      document.getElementById('resultVal').textContent = 'Enter a number first';
      return;
    }

    setLoading(true);

    // CSV export endpoint — no CORS issues, works with "Published to web"
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('Fetch failed');
      const text = await res.text();

      // Parse CSV rows
      const rows = text.trim().split('\n').map(r => r.split(','));

      const target = parseInt(num, 10);
      let found = null;

      // Skip header row (row 0 = "Input, Output")
      for (let i = 1; i < rows.length; i++) {
        const colA = parseInt(rows[i][0], 10);
        const colB = rows[i][1] ? rows[i][1].trim() : null;
        if (colA === target && colB) {
          found = colB;
          break;
        }
      }

      setLoading(false);
      const rv = document.getElementById('resultVal');
      if (found !== null) {
        rv.className = 'result-value';
        rv.textContent = found;
      } else {
        rv.className = 'result-value error';
        rv.textContent = `No row found for ${target}`;
      }

    } catch (err) {
      setLoading(false);
      const rv = document.getElementById('resultVal');
      rv.className = 'result-value error';
      rv.textContent = 'Could not reach sheet — check sharing settings';
      console.error(err);
    }
  }
</script>
</body>
</html>
