<html lang="en">
<head>
<meta charset="UTF-8">

<title>SBS Product Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1D3557;--navy-dark:#12243a;--orange:#E87722;--orange-light:#F0913A;--orange-pale:#FDF0E5;--white:#ffffff;--gray-50:#F8F9FA;--gray-100:#F0F2F5;--gray-200:#E2E6EA;--gray-300:#CED4DA;--gray-400:#ADB5BD;--gray-500:#6C757D;--gray-600:#495057;--gray-700:#343A40;--hh:72px;--sbh:53px;--sh:calc(var(--hh) + var(--sbh));--sw:270px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--gray-100);color:var(--gray-700);min-height:100vh;}
header{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:3px solid var(--orange);box-shadow:0 2px 8px rgba(0,0,0,.1);height:var(--hh);display:flex;align-items:center;padding:.65rem 1.5rem;gap:16px;}
.hlogo img{height:48px;display:block;}
.hdiv{width:1px;height:36px;background:var(--gray-200);flex-shrink:0;}
.htitles{display:flex;flex-direction:column;gap:2px;}
.htitle{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;color:var(--navy);line-height:1;}
.hsub{font-size:11px;color:var(--gray-500);}
.hspace{flex:1;}
.rcount{font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;color:var(--orange);white-space:nowrap;}
.sbar{background:var(--white);border-bottom:1px solid var(--gray-200);padding:10px 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:var(--hh);z-index:99;}
.swrap{position:relative;flex:1;max-width:520px;}
.swrap .sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none;}
#sInput{width:100%;padding:9px 36px 9px 38px;border:2px solid var(--navy);border-radius:6px;font-family:'Inter',sans-serif;font-size:14px;color:var(--gray-700);background:var(--white);outline:none;transition:border-color .2s;}
#sInput::placeholder{color:var(--gray-400);font-style:italic;}
#sInput:focus{border-color:var(--orange);}
#sClear{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:none;cursor:pointer;background:none;border:none;padding:2px;color:var(--gray-400);}
#sClear:hover{color:var(--gray-700);}
.page{display:flex;}
aside{width:var(--sw);min-width:var(--sw);background:var(--white);border-right:1px solid var(--gray-200);height:calc(100vh - var(--sh));position:sticky;top:var(--sh);overflow-y:auto;overflow-x:hidden;}
aside::-webkit-scrollbar{width:4px;}
aside::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:4px;}
.stoplbl{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray-500);padding:14px 16px 6px;}
.ni{display:block;width:100%;}
.nr{display:flex;align-items:center;width:100%;padding:7px 12px 7px 0;gap:4px;cursor:pointer;transition:background .12s;}
.nr:hover{background:var(--orange-pale);}
.nr.act{background:var(--orange-pale);}
.nr.act .nl{color:var(--orange);font-weight:600;}
.nr.act .nc{background:var(--orange);color:var(--white);}
.nind{flex-shrink:0;}
.ntog{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--gray-400);transition:transform .2s;font-size:10px;}
.ntog.open{transform:rotate(90deg);}
.ntog.leaf{visibility:hidden;}
.nl{flex:1;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--gray-700);line-height:1.3;}
.nc{font-family:'Barlow',sans-serif;font-size:10.5px;background:var(--gray-100);color:var(--gray-500);padding:1px 7px;border-radius:10px;min-width:24px;text-align:center;flex-shrink:0;}
.nch.col{display:none;}
.d0 .nind{width:12px;}.d1 .nind{width:28px;}.d2 .nind{width:44px;}.d3 .nind{width:60px;}
.d0>.nr{border-top:1px solid var(--gray-200);}
.d0>.nr .nl{font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:var(--navy);}
main{flex:1;padding:20px 24px;min-width:0;}
#bc{font-family:'Inter',sans-serif;font-size:12px;color:var(--gray-500);margin-bottom:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.bcl{cursor:pointer;}
.bcl:hover{color:var(--orange);text-decoration:underline;}
.bcs{color:var(--gray-300);}
.bcc{color:var(--navy);font-weight:600;}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.card{background:var(--white);border:1.5px solid var(--gray-200);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s,border-color .18s;position:relative;}
.card-link{display:flex;flex-direction:column;flex:1;text-decoration:none;color:inherit;cursor:pointer;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange);transform:scaleX(0);transform-origin:left;transition:transform .2s;border-radius:10px 10px 0 0;}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--orange);}
.card:hover::before{transform:scaleX(1);}
.cimg{background:var(--gray-50);height:160px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--gray-200);overflow:visible;position:relative;}
.cimg img{max-width:85%;max-height:85%;object-fit:contain;transition:transform .28s ease;}.cimg img[data-isph]{opacity:0.55;filter:sepia(1) saturate(3) hue-rotate(330deg) brightness(1.1);max-width:60%;max-height:60%;}
.card:hover .cimg img{transform:scale(1.06);}
.cimg img.zoom-active{transform:scale(1.5)!important;z-index:200;position:relative;}
.card.img-zoomed{overflow:visible!important;z-index:200;}
.noimgtxt{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--gray-300);}
.cbody{padding:14px 14px 10px;display:flex;flex-direction:column;flex:1;gap:5px;}
.cbcat{font-family:'Inter',sans-serif;font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;line-height:1.3;}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800;line-height:1.15;color:var(--navy);}
.cdesc{font-family:'Inter',sans-serif;font-size:12px;color:var(--gray-500);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cdesc.expanded{display:block;-webkit-line-clamp:unset;overflow:visible;}
.dxbtn{width:18px;height:18px;border-radius:50%;background:var(--orange-pale);border:1.5px solid var(--orange);display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--orange);cursor:pointer;flex-shrink:0;line-height:1;transition:background .15s,transform .15s;user-select:none;}
.dxbtn:hover{background:var(--orange);color:var(--white);}
.cstds{margin-top:auto;padding-top:8px;border-top:1px solid var(--gray-200);display:flex;flex-wrap:wrap;gap:4px;}
.stag{font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;background:var(--gray-100);color:var(--gray-500);padding:2px 7px;border-radius:4px;white-space:nowrap;text-decoration:none;display:inline-block;border:1px solid var(--gray-200);transition:all .15s;}
a.stag{background:#EBF1FB;color:#1D4DB8;border-color:#C3D4F5;}
a.stag:hover{background:var(--navy);color:var(--white);border-color:var(--navy);}
.cfoot{padding:10px 14px;border-top:1px solid var(--gray-200);display:flex;align-items:center;justify-content:flex-end;}
.clbl{font-family:'Inter',sans-serif;font-size:10px;color:var(--gray-400);}
.obtn{font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;background:var(--orange);color:var(--white);border:none;padding:5px 14px;border-radius:6px;cursor:pointer;text-decoration:none;transition:all .15s;white-space:nowrap;box-shadow:0 2px 6px rgba(232,119,34,.3);display:inline-block;}
.obtn:hover{background:var(--orange-light);transform:translateY(-1px);}
#empty{display:none;text-align:center;padding:80px 20px;color:var(--gray-500);}
#empty h3{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;color:var(--navy);}
/* Loading / error states */
#loadingState{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--gray-500);gap:16px;}
#loadingState .spin{width:40px;height:40px;border:4px solid var(--gray-200);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#errorState{display:none;text-align:center;padding:60px 20px;color:var(--gray-500);}
#errorState h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#c0392b;margin-bottom:10px;}
#errorState pre{font-size:11px;text-align:left;background:var(--gray-100);padding:12px;border-radius:6px;max-width:600px;margin:12px auto 0;overflow-x:auto;white-space:pre-wrap;}
#sbsPrint{display:none;}
@media(max-width:700px){aside{display:none;}#grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}}
</style>
</head>

<script>
// ============================================================
// CONFIGURATION — replace with your published Google Sheet URLs

var SHEET_PRODUCTS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRq6d25OKNWYdxYyl97fU9fR5wnnyHg9xnKZhPS3qZJ7QYk0zlr7HHrcz3mybq_gPzuF3U4x1BHXHhq/pub?gid=1757152841&single=true&output=csv';
var SHEET_STANDARDS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRq6d25OKNWYdxYyl97fU9fR5wnnyHg9xnKZhPS3qZJ7QYk0zlr7HHrcz3mybq_gPzuF3U4x1BHXHhq/pub?gid=600976726&single=true&output=csv';
// ============================================================

var PRODUCTS = [];
var TREE     = {};
var STDS     = {};
var CA = 'cl'+'ass';
var PH_SRC = (document.getElementById('phImg')||{src:''}).src;
var activePath = [];
var searchTerm = '';
var openNodes  = {};

// ---- CSV parser (RFC 4180 compliant) ----
function parseCSV(text) {
  var rows = [], row = [], field = '', inQ = false, i = 0, c;
  // Normalize line endings
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  while (i < text.length) {
    c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i += 2; continue; }
        inQ = false;
      } else { field += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); field = ''; rows.push(row); row = []; }
      else { field += c; }
    }
    i++;
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function csvToObjects(text) {
  var rows = parseCSV(text);
  if (!rows.length) return [];
  var headers = rows[0];
  var out = [];
  for (var i = 1; i < rows.length; i++) {
    if (rows[i].length === 0 || (rows[i].length === 1 && rows[i][0] === '')) continue;
    var obj = {};
    for (var j = 0; j < headers.length; j++) {
      obj[headers[j]] = rows[i][j] || '';
    }
    out.push(obj);
  }
  return out;
}

// ---- Build TREE from flat PRODUCTS ----
function buildTree(products) {
  var tree = {};
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    var parts = p.cat.split(' > ');
    var node = tree;
    for (var d = 0; d < parts.length; d++) {
      var name = parts[d];
      if (!node[name]) node[name] = { count: 0, children: {} };
      node[name].count++;
      if (d < parts.length - 1) node = node[name].children;
    }
  }
  return tree;
}

// ---- Fetch helpers ----
function fetchText(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status + ' fetching ' + url);
    return r.text();
  });
}

function showError(msg, detail) {
  document.getElementById('loadingState').style.display = 'none';
  var es = document.getElementById('errorState');
  es.style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('errorDetail').textContent = detail || '';
}

// ---- Main init ----
function init() {
  if (!SHEET_PRODUCTS_CSV_URL || SHEET_PRODUCTS_CSV_URL === '') {
    showError(
      'Google Sheet URL not configured.',
      'Google Sheet URL is blank. Open the HTML and set SHEET_PRODUCTS_CSV_URL and SHEET_STANDARDS_CSV_URL.'
    );
    return;
  }

  var p1 = fetchText(SHEET_PRODUCTS_CSV_URL);
  var p2 = SHEET_STANDARDS_CSV_URL && SHEET_STANDARDS_CSV_URL !== ''
    ? fetchText(SHEET_STANDARDS_CSV_URL)
    : Promise.resolve('standard,link\n');

  Promise.all([p1, p2]).then(function(results) {
    var prodRaw = csvToObjects(results[0]);
    var stdsRaw = csvToObjects(results[1]);

    if (!prodRaw.length) {
      showError('Products sheet returned no data.', 'Check the CSV URL and that the sheet is published.');
      return;
    }

    // ---------- Normalise column names ----------
    // The sheet may use display labels or raw field names.
    // We detect which set is in use from the first row keys.
    var COL_MAP = {
      'ID (Name)':     'id',
      'Category Path': 'cat',
      'Image URL':     'img',
      'Description':   'desc',
      'Standards':     'standards',
      'Shop URL':      'url'
    };

    function normaliseRow(src) {
      var out = {};
      for (var k in src) {
        if (!src.hasOwnProperty(k)) continue;
        out[COL_MAP[k] || k] = src[k] || '';
      }
      return out;
    }

    var products = [];
    for (var i = 0; i < prodRaw.length; i++) {
      var row = normaliseRow(prodRaw[i]);
      // Skip blank rows, header echo rows, and the instructional note row
      if (!row.id) continue;
      if (row.id === 'id' || row.id === 'ID (Name)') continue;
      if (!row.cat) continue;
      // Skip any row whose cat doesn't look like a real category path
      // (the note row has no cat value)
      products.push(row);
    }

    if (!products.length) {
      showError('No valid product rows found.',
        'First row keys seen: ' + Object.keys(prodRaw[0]).join(', '));
      return;
    }

    PRODUCTS = products;
    // Standards sheet may use display headers or raw field names
    var STDS_COL_MAP = {
      'Standard Code':                    'standard',
      'Document URL (Google Drive / PDF)': 'link',
      'standard': 'standard',
      'link': 'link'
    };
    STDS = {};
    for (var j = 0; j < stdsRaw.length; j++) {
      var sr = {};
      for (var k in stdsRaw[j]) {
        if (!stdsRaw[j].hasOwnProperty(k)) continue;
        sr[STDS_COL_MAP[k] || k] = stdsRaw[j][k] || '';
      }
      if (sr.standard) STDS[sr.standard] = sr.link || '';
    }
    TREE = buildTree(PRODUCTS);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('grid').style.display = '';

    buildSidebar();
    render();
  }).catch(function(err) {
    showError(
      'Failed to load data: ' + err.message,
      'Make sure the Google Sheet is published to the web as CSV.\n' +
      'File → Share → Publish to web → select the sheet tab → CSV → Publish.\n\n' +
      'CORS note: the sheet must be truly public (Anyone with the link → Viewer).'
    );
  });
}

// ---- UI functions (identical logic to original) ----
function mk(tag, cn) {
  var e = document.createElement(tag);
  if (cn) e.setAttribute(CA, cn);
  return e;
}
function tx(s) { return document.createTextNode(s); }
function sortedKeys(o) {
  var k = [];
  for (var p in o) { if (o.hasOwnProperty(p)) k.push(p); }
  k.sort();
  return k;
}

function buildSidebar() {
  var aside = document.getElementById('sidebar');
  var lbl = aside.querySelector('.stoplbl');
  while (aside.firstChild) aside.removeChild(aside.firstChild);
  aside.appendChild(lbl);
  renderTree(TREE, [], aside, 0);
}

function renderTree(node, path, container, depth) {
  var keys = sortedKeys(node);
  for (var i = 0; i < keys.length; i++) {
    var name = keys[i];
    var val  = node[name];
    var fullPath = path.concat([name]);
    var pathKey  = fullPath.join('>');
    var hasC     = sortedKeys(val.children).length > 0;
    var isActive = activePath.join('>') === pathKey;
    var isOpen   = openNodes[pathKey] || false;
    var isAnc    = activePath.join('>').indexOf(pathKey + '>') === 0 || isActive;

    var wrapper = mk('div', 'ni d' + depth);
    var rowCN   = 'nr' + (isActive ? ' act' : '');
    var row     = mk('div', rowCN);
    row.setAttribute('data-path', pathKey);

    var tog = mk('div', 'ntog' + (!hasC ? ' leaf' : (isOpen ? ' open' : '')));
    tog.innerHTML = '&#9654;';
    var lbl = mk('div', 'nl');
    lbl.appendChild(tx(name));
    var cnt = mk('div', 'nc');
    cnt.appendChild(tx(String(val.count)));

    row.appendChild(mk('div', 'nind'));
    row.appendChild(tog);
    row.appendChild(lbl);
    row.appendChild(cnt);
    wrapper.appendChild(row);

    if (hasC) {
      var cc = mk('div', 'nch' + ((!isOpen && !isAnc) ? ' col' : ''));
      renderTree(val.children, fullPath, cc, depth + 1);
      wrapper.appendChild(cc);
    }
    container.appendChild(wrapper);
  }
}

function getStds(s) {
  if (!s) return [];
  var a = s.split('\n'), r = [];
  for (var i = 0; i < a.length; i++) {
    var t = a[i].replace(/^\s+|\s+$/g, '');
    if (t) r.push(t);
  }
  return r;
}

function makeStdTag(std) {
  var url = STDS[std];
  var el;
  if (url) {
    el = document.createElement('a');
    el.setAttribute(CA, 'stag');
    el.setAttribute('href', url);
    el.setAttribute('target', '_blank');
    el.setAttribute('rel', 'noopener');
  } else {
    el = mk('span', 'stag');
  }
  el.appendChild(tx(std));
  return el;
}

function resolveImgUrl(url) {
  if (!url) return PH_SRC;
  // Google Drive: convert any share/view link to a direct embeddable URL
  // Handles: /file/d/FILE_ID/view, /open?id=FILE_ID, /uc?id=FILE_ID
  var m = url.match(/\/d\/([a-zA-Z0-9_-]{10,})\//);
  if (!m) m = url.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w400';
  return url;
}

function render() {
  var grid  = document.getElementById('grid');
  var empty = document.getElementById('empty');
  var rc    = document.getElementById('rcount');
  var items = [], i, j, p;

  for (i = 0; i < PRODUCTS.length; i++) items.push(PRODUCTS[i]);

  if (activePath.length) {
    var prefix = activePath.join(' > '), fi = [];
    for (i = 0; i < items.length; i++) {
      p = items[i];
      if (p.cat === prefix || p.cat.indexOf(prefix + ' > ') === 0) fi.push(p);
    }
    items = fi;
  }

  if (searchTerm) {
    var ww = searchTerm.toLowerCase().split(/\s+/), wi = [];
    for (i = 0; i < ww.length; i++) { if (ww[i]) wi.push(ww[i]); }
    var si = [];
    for (i = 0; i < items.length; i++) {
      p = items[i];
      var hay = (p.id + ' ' + p.cat + ' ' + p.desc + ' ' + p.standards).toLowerCase();
      var ok = true;
      for (j = 0; j < wi.length; j++) { if (hay.indexOf(wi[j]) === -1) { ok = false; break; } }
      if (ok) si.push(p);
    }
    items = si;
  }

  rc.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');

  if (!items.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    renderBreadcrumb();
    return;
  }
  grid.style.display = '';
  empty.style.display = 'none';
  renderBreadcrumb();

  var frag = document.createDocumentFragment();
  for (i = 0; i < items.length; i++) {
    p = items[i];
    var card = mk('div', 'card');

    var imgWrap = mk('div', 'cimg');
    var imgEl = document.createElement('img');
    imgEl.setAttribute('src', resolveImgUrl(p.img));
    imgEl.setAttribute('alt', p.id);
    imgEl.setAttribute('loading', 'lazy');
    imgEl.setAttribute('data-ph', '1');
    if (!p.img) { imgEl.setAttribute('data-isph', '1'); }
    imgEl.onerror = function () {
      this.setAttribute('src', PH_SRC);
      this.setAttribute('data-isph', '1');
    };
    imgEl.addEventListener('mouseover', function(e) {
      e.stopPropagation();
      this.classList.add('zoom-active');
      var c = this.closest ? this.closest('.card') : null;
      if (c) c.classList.add('img-zoomed');
    });
    imgEl.addEventListener('mouseout', function() {
      this.classList.remove('zoom-active');
      var c = this.closest ? this.closest('.card') : null;
      if (c) c.classList.remove('img-zoomed');
    });
    imgWrap.appendChild(imgEl);

    var body = mk('div', 'cbody');
    var cp   = p.cat.split(' > ');
    var bctx = cp.length > 1 ? cp.slice(0, cp.length - 1).join(' › ') : '';
    var bcEl = mk('div', 'cbcat');
    bcEl.appendChild(tx(bctx));
    var titleRow = mk('div', 'ctitle-row');
    titleRow.style.cssText = 'display:flex;align-items:flex-start;justify-content:space-between;gap:6px;';
    var titleEl = mk('div', 'ctitle');
    titleEl.style.flex = '1';
    titleEl.appendChild(tx(p.id));
    titleRow.appendChild(titleEl);

    var descEl = null;
    if (p.desc) {
      descEl = mk('div', 'cdesc');
      descEl.appendChild(tx(p.desc));
      // Only show + button if text is long enough to be clamped
      if (p.desc.length > 80) {
        var dxBtn = mk('button', 'dxbtn');
        dxBtn.setAttribute('title', 'Expand description');
        dxBtn.setAttribute('aria-label', 'Expand description');
        dxBtn.appendChild(tx('＋'));
        dxBtn.addEventListener('click', (function(btn, el) {
          return function(e) {
            e.preventDefault();
            e.stopPropagation();
            var expanded = el.classList.toggle('expanded');
            btn.textContent = expanded ? '－' : '＋';
          };
        })(dxBtn, descEl));
        titleRow.appendChild(dxBtn);
      }
    }

    body.appendChild(bcEl);
    body.appendChild(titleRow);

    if (descEl) {
      body.appendChild(descEl);
    }

    var stds = getStds(p.standards);
    if (stds.length) {
      var sw = mk('div', 'cstds');
      for (j = 0; j < stds.length; j++) sw.appendChild(makeStdTag(stds[j]));
      body.appendChild(sw);
    }

    var foot = mk('div', 'cfoot');
    var btn = document.createElement('a');
    btn.setAttribute(CA, 'obtn');
    btn.setAttribute('href', p.url);
    btn.setAttribute('target', '_blank');
    btn.setAttribute('rel', 'noopener');
    btn.appendChild(tx('View ' + p.id + ' Category'));
    foot.appendChild(btn);

    var linkWrap = document.createElement('a');
    linkWrap.setAttribute(CA, 'card-link');
    linkWrap.setAttribute('href', p.url);
    linkWrap.setAttribute('target', '_blank');
    linkWrap.setAttribute('rel', 'noopener');
    linkWrap.appendChild(imgWrap);
    linkWrap.appendChild(body);
    card.appendChild(linkWrap);
    card.appendChild(foot);
    frag.appendChild(card);
  }
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  grid.appendChild(frag);
}

function renderBreadcrumb() {
  var bc = document.getElementById('bc');
  while (bc.firstChild) bc.removeChild(bc.firstChild);
  if (!activePath.length) return;
  for (var i = 0; i <= activePath.length; i++) {
    var lbl = i === 0 ? 'All' : activePath[i - 1];
    var path = activePath.slice(0, i);
    var isLast = i === activePath.length;
    if (i > 0) { var sep = mk('span', 'bcs'); sep.appendChild(tx('>')); bc.appendChild(sep); }
    var sp = mk('span', isLast ? 'bcc' : 'bcl');
    sp.setAttribute('data-bcpath', JSON.stringify(path));
    sp.appendChild(tx(lbl));
    bc.appendChild(sp);
  }
}

function navTo(path) {
  activePath = path;
  for (var i = 1; i <= path.length; i++) openNodes[path.slice(0, i).join('>')] = true;
  buildSidebar();
  render();
}

function setSClear(v) {
  var el = document.getElementById('sClear');
  if (el) el.style.display = v ? 'flex' : 'none';
}

document.addEventListener('click', function (e) {
  var el = e.target;
  for (var i = 0; i < 8; i++) {
    if (!el || el === document.body) break;
    var tag = el.tagName ? el.tagName.toUpperCase() : '';
    if (tag === 'A' && el.getAttribute('href')) return;
    if (el.id === 'sClear') {
      document.getElementById('sInput').value = '';
      searchTerm = '';
      setSClear(false);
      render();
      return;
    }
    var dp = el.getAttribute ? el.getAttribute('data-path') : null;
    if (dp) {
      var parts = dp.split('>');
      var hc = el.querySelector ? el.querySelector('.nch') : null;
      var alreadyActive = activePath.join('>') === dp;
      if (hc) {
        if (alreadyActive) {
          openNodes[dp] = false;
          activePath = parts.slice(0, parts.length - 1);
        } else {
          openNodes[dp] = true;
          activePath = parts;
        }
      } else {
        activePath = parts;
      }
      searchTerm = '';
      document.getElementById('sInput').value = '';
      setSClear(false);
      buildSidebar();
      render();
      return;
    }
    var dbp = el.getAttribute ? el.getAttribute('data-bcpath') : null;
    if (dbp) { navTo(JSON.parse(dbp)); return; }
    el = el.parentNode;
  }
});

document.getElementById('sInput').addEventListener('input', function (e) {
  searchTerm = e.target.value.replace(/^\s+|\s+$/g, '');
  setSClear(searchTerm.length > 0);
  if (searchTerm) { activePath = []; buildSidebar(); }
  render();
});

// Kick off data load
init();
</script>
</body>
</html>
